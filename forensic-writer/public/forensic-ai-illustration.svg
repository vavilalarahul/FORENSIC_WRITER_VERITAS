<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3" />
    </linearGradient>
    
    <radialGradient id="centerGlow">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#8b5cf6" stroke-width="0.5"/>
    </pattern>
    <rect width="1920" height="1080" fill="url(#grid)"/>
  </g>
  
  <!-- Background Glow -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="url(#centerGlow)" opacity="0.5"/>
  
  <!-- Central Fingerprint Scanner -->
  <g transform="translate(960, 540)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.4"/>
    
    <!-- Fingerprint Pattern -->
    <g opacity="0.8">
      <path d="M -80,-60 Q -40,-80 0,-60 Q 40,-40 80,-60" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
      <path d="M -90,-30 Q -45,-50 0,-30 Q 45,-10 90,-30" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
      <path d="M -100,0 Q -50,-20 0,0 Q 50,20 100,0" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
      <path d="M -90,30 Q -45,10 0,30 Q 45,50 90,30" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
      <path d="M -80,60 Q -40,40 0,60 Q 40,80 80,60" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Ridge lines -->
      <path d="M -60,-80 Q -30,-70 0,-80 Q 30,-90 60,-80" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -70,-50 Q -35,-40 0,-50 Q 35,-60 70,-50" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -75,-20 Q -37,-10 0,-20 Q 37,-30 75,-20" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -75,10 Q -37,20 0,10 Q 37,0 75,10" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -70,40 Q -35,50 0,40 Q 35,30 70,40" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -60,70 Q -30,60 0,70 Q 30,80 60,70" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    
    <!-- Central Scanner -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
    
    <!-- Scanner Beam -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#60a5fa" stroke-width="2" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#a78bfa" stroke-width="2" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating Data Elements -->
  <g opacity="0.7">
    <!-- Data Points Top Left -->
    <g transform="translate(300, 200)">
      <rect x="0" y="0" width="80" height="60" rx="8" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
      <circle cx="20" cy="20" r="3" fill="#60a5fa"/>
      <circle cx="40" cy="20" r="3" fill="#60a5fa"/>
      <circle cx="60" cy="20" r="3" fill="#60a5fa"/>
      <path d="M 15,35 L 25,45 L 35,35 L 45,45 L 55,35 L 65,45" fill="none" stroke="#a78bfa" stroke-width="1"/>
    </g>
    
    <!-- DNA Helix Top Right -->
    <g transform="translate(1400, 250)">
      <path d="M 0,0 Q 20,15 40,0 T 80,0 T 120,0" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
      <path d="M 0,10 Q 20,25 40,10 T 80,10 T 120,10" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="2" fill="#a78bfa"/>
      <circle cx="40" cy="0" r="2" fill="#a78bfa"/>
      <circle cx="80" cy="0" r="2" fill="#a78bfa"/>
      <circle cx="120" cy="0" r="2" fill="#a78bfa"/>
      <circle cx="20" cy="10" r="2" fill="#60a5fa"/>
      <circle cx="60" cy="10" r="2" fill="#60a5fa"/>
      <circle cx="100" cy="10" r="2" fill="#60a5fa"/>
    </g>
    
    <!-- Binary Code Bottom Left -->
    <g transform="translate(250, 750)" opacity="0.5">
      <text x="0" y="0" fill="#3b82f6" font-family="monospace" font-size="14">01101</text>
      <text x="0" y="20" fill="#3b82f6" font-family="monospace" font-size="14">10010</text>
      <text x="0" y="40" fill="#3b82f6" font-family="monospace" font-size="14">11001</text>
      <text x="0" y="60" fill="#3b82f6" font-family="monospace" font-size="14">00110</text>
    </g>
    
    <!-- Network Nodes Bottom Right -->
    <g transform="translate(1500, 700)">
      <circle cx="0" cy="0" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="30" cy="20" r="4" fill="#6366f1" opacity="0.8"/>
      <circle cx="60" cy="0" r="4" fill="#3b82f6" opacity="0.8"/>
      <circle cx="30" cy="-20" r="4" fill="#60a5fa" opacity="0.8"/>
      <line x1="0" y1="0" x2="30" y2="20" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="30" y1="20" x2="60" y2="0" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="60" y1="0" x2="30" y2="-20" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="30" y1="-20" x2="0" y2="0" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Cyber Grid Lines -->
  <g opacity="0.3">
    <path d="M 200,300 L 400,250 L 600,300" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <path d="M 1300,350 L 1500,300 L 1700,350" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <path d="M 300,700 L 500,650 L 700,700" fill="none" stroke="#6366f1" stroke-width="1"/>
    <path d="M 1200,750 L 1400,700 L 1600,750" fill="none" stroke="#60a5fa" stroke-width="1"/>
  </g>
  
  <!-- Floating Particles -->
  <g opacity="0.6">
    <circle cx="320" cy="180" r="2" fill="#60a5fa">
      <animate attributeName="cy" values="180;160;180" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="230" r="2" fill="#a78bfa">
      <animate attributeName="cy" values="230;210;230" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="780" r="2" fill="#3b82f6">
      <animate attributeName="cy" values="780;760;780" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1520" cy="730" r="2" fill="#8b5cf6">
      <animate attributeName="cy" values="730;710;730" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="400" r="1.5" fill="#6366f1">
      <animate attributeName="cy" values="400;380;400" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1400" cy="450" r="1.5" fill="#60a5fa">
      <animate attributeName="cy" values="450;430;450" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Magnifying Glass Element -->
  <g transform="translate(650, 350)" opacity="0.4">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="30" y1="30" x2="50" y2="50" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Lock Icon -->
  <g transform="translate(1250, 400)" opacity="0.5">
    <rect x="-15" y="-5" width="30" height="25" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M -10,-5 L -10,-12 Q -10,-20 0,-20 Q 10,-20 10,-12 L 10,-5" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="8" r="3" fill="#60a5fa"/>
  </g>
</svg>
